# Hostinger Node.js — deploy via Git (com build no servidor)

framework = "nextjs"
node = "22"
install_command = "npm ci"
build_command = "npm run build"
start_command = "node server.js"
output_directory = ""

# Se o build EACCES voltar, use o ZIP standalone:
# install_command = "true"
# build_command = "true"
# start_command = "node server.js"
# (ZIP gerado com: npm run pack:standalone)
